<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>NN Auth</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <style>
        body {
            background-color: #1e1e2f;
            font-family: Arial, sans-serif;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-box {
            background-color: #2b2b3f;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            width: 300px;
            text-align: center;
        }

        h1 {
            margin-bottom: 30px;
            font-size: 24px;
        }

        input[type=text],
        input[type=password] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background-color: #1e1e2f;
            border: 1px solid #444;
            border-radius: 4px;
            color: #fff;
        }

        input[type=submit] {
            width: 100%;
            padding: 10px;
            background-color: #4a90e2;
            border: none;
            border-radius: 4px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        input[type=submit]:hover {
            background-color: #357abd;
        }

        .message {
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <h1>Neuron Network Login</h1>
        <form method="POST" action="/login">
            <input type="text" name="username" placeholder="Username" required><br>
            <input type="password" name="password" placeholder="Password" required><br>
            <input type="submit" value="Login">
        </form>
        {% if message %}
        <div class="message">{{ message|safe }}</div>
        {% endif %}
    </div>
</body>

</html>
