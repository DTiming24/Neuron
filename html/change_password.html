<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Change Password</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e2f;
            color: #e0e0e0;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            background-color: #1e1e2f;
            border-bottom: 1px solid #333;
            z-index: 1000;
        }

        .header img {
            height: 32px;
            width: 32px;
            margin-right: 15px;
        }

        .header a {
            color: #e0e0e0;
            text-decoration: none;
            margin-right: 20px;
            font-weight: bold;
        }

        .header .spacer {
            flex: 1;
        }

        .settings-container {
            margin-top: 80px;
            padding: 20px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .settings-container h1 {
            color: #4a90e2;
            margin-bottom: 20px;
        }

        .settings-container label {
            display: block;
            margin: 10px 0 5px;
            font-weight: bold;
        }

        .settings-container input {
            width: 100%;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #444;
            background: #2a2a3d;
            color: #fff;
            box-sizing: border-box;
        }

        .settings-container button {
            margin-top: 20px;
            padding: 12px 24px;
            border-radius: 25px;
            background: linear-gradient(135deg, #4a90e2, #357abd);
            color: #fff;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }

        .settings-container button:hover {
            background: linear-gradient(135deg, #357abd, #1e60b2);
        }

        .error {
            margin-top: 15px;
            color: #ff6b6b;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <header class="header">
        <img src="/static/favicon.ico" alt="logo">
        <a href="/dashboard">Dashboard</a>
        <div class="spacer"></div>
        <a href="/logout">
            <img src="/static/logout.png" alt="Logout" title="Logout" style="height:24px; width:24px; cursor:pointer;">
        </a>
    </header>

    <div class="settings-container">
        <h1>Change Password</h1>
        <form method="POST">
            <label for="old_password">Old Password</label>
            <input type="password" name="old_password" id="old_password" required>

            <label for="new_password">New Password</label>
            <input type="password" name="new_password" id="new_password" required>

            <label for="confirm_password">Confirm New Password</label>
            <input type="password" name="confirm_password" id="confirm_password" required>

            <button type="submit">Update Password</button>
        </form>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
    </div>
</body>

</html>
