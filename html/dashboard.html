<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Neuron Dashboard</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e2f;
            color: #e0e0e0;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            background-color: #1e1e2f;
            border-bottom: 1px solid #333;
            z-index: 1000;
        }

        .header img {
            height: 32px;
            width: 32px;
            margin-right: 15px;
        }

        .header a {
            color: #e0e0e0;
            text-decoration: none;
            margin-right: 20px;
            font-weight: bold;
        }

        .header .spacer {
            flex: 1;
        }

        .dashboard-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding-top: 60px;
            /* отступ под header */
            box-sizing: border-box;
            text-align: center;
        }

        .dashboard-container h1 {
            font-size: 32px;
            margin-bottom: 20px;
            color: #4a90e2;
        }

        .dashboard-container a {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 24px;
            border-radius: 25px;
            background: linear-gradient(135deg, #4a90e2, #357abd);
            color: #fff;
            font-weight: bold;
            text-decoration: none;
            transition: background 0.3s;
        }

        .dashboard-container a:hover {
            background: linear-gradient(135deg, #357abd, #1e60b2);
        }

        .nav-links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 30px;
            width: 80%;
            max-width: 800px;
        }

        .nav-links a {
            display: block;
            padding: 20px;
            background: linear-gradient(135deg, #4a90e2, #357abd);
            color: #fff;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .nav-links a:hover {
            background: linear-gradient(135deg, #357abd, #1e60b2);
            transform: translateY(-2px);
        }
    </style>
    <header class="header">
        <img src="/static/favicon.ico" alt="logo">
        <a href="/dashboard">Dashboard</a>
        <div class="spacer"></div>
        <a href="/logout">
            <img src="/static/logout.png" alt="Logout" title="Logout" style="height:24px; width:24px; cursor:pointer;">
        </a>
    </header>
</head>

<body>
    <div class="dashboard-container">
        <h1>Neuron Network Dashboard</h1>
        <div class="nav-links">
            <a href="/neuron/chat">💬 Chat</a>
            <a href="/settings">⚙️ Settings</a>
            {% if is_admin %}
            <a href="/admin_tools">🔧 Admin Tools</a>
            {% endif %}
        </div>
    </div>

</body>

</html>
